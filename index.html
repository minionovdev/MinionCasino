<!DOCTYPE html>
<html>
<head>
  <title>Minion Casino</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      background: #0f0f1a;
      color: white;
      text-align: center;
      font-family: sans-serif;
    }

    #wheel {
      font-size: 90px;
      transition: transform 3s ease-out;
    }

    .card {
      background: #1c1c2e;
      margin: 10px;
      padding: 20px;
      border-radius: 15px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: gold;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🎰 Minion Casino</h1>

<div class="card">
  Balance: <span id="bal">0</span>
</div>

<div class="card">
  <input id="stake" placeholder="stake" />
  <button onclick="join()">Join PvP</button>
</div>

<div class="card">
  <div id="wheel">🎡</div>
  <h3 id="status">Waiting...</h3>
</div>

<script src="app.js"></script>
</body>
</html>
